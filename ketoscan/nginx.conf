# ============================================================
# Nginx - Planeta Keto Scan
# La app corre con PM2 en 127.0.0.1:3001 y se sirve bajo /ketoscan
# Copia este server block a /etc/nginx/sites-available/ y enlaza a sites-enabled.
# ============================================================

# Redireccion HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tu-dominio.com www.tu-dominio.com;

    # Certbot / ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tu-dominio.com www.tu-dominio.com;

    # --- SSL (Let's Encrypt / Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/tu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tu-dominio.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Tamaño de subida (fotos para escaneo)
    client_max_body_size 15M;

    # Compresion
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               application/manifest+json image/svg+xml;

    # --- App Planeta Keto Scan bajo /ketoscan ---
    location /ketoscan {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Cache de estaticos de Next.js
    location /ketoscan/_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # El service worker no se debe cachear
    location = /ketoscan/sw.js {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
